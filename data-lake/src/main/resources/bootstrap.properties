spring.application.name=tech-demo
spring.profiles.active=datalake
spring.data.cassandra.keyspace-name=datalake
spring.data.cassandra.schema-action=create
com.github.nosan.embedded.cassandra.cql-scripts=classpath:schema.cql
server.port=8095
spring.cloud.config.profile=datalake

#Metrics related configurations
management.endpoint.metrics.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true